name: CI/CD Pipeline - PetFinder Backend

on:
  push:
    branches: [ develop, main, feature/** ]
  pull_request:
    branches: [ develop, main ]

env:
  NODE_VERSION: '20.x'
  ARTIFACT_NAME: 'petfinder-backend'

jobs:
  # ============================================
  # JOB 1: BUILD AND TEST
  # ============================================
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout del código
      - name: 🔄 Checkout Code
        uses: actions/checkout@v4
      
      # 2. Setup Node.js
      - name: 📦 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      # 3. Instalar dependencias
      - name: 📚 Install Dependencies
        run: npm ci
      
      # 4. Linter (opcional, comentar si no lo tienes configurado)
      - name: 🔍 Run Linter
        run: npm run lint
        continue-on-error: true
      
      # 5. Ejecutar tests
      - name: 🧪 Run Tests
        run: npm test
      
      # 6. Build de la aplicación
      - name: 🏗️ Build Application
        run: npm run build
      
      # 7. Generar reporte de cobertura
      - name: 📊 Upload Coverage Report
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/cobertura-coverage.xml
          flags: unittests
          name: codecov-petfinder
          fail_ci_if_error: false
      
      # 8. Subir artifacts para deployment
      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            dist/
            node_modules/
            package*.json
          retention-days: 7

  # ============================================
  # JOB 2: DEPLOY TO STAGING (solo en develop)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://${{ secrets.AZURE_APP_SERVICE_NAME }}-staging.azurewebsites.net
    
    steps:
      # 1. Descargar artifacts
      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
      
      # 2. Deploy a Azure App Service (Staging)
      - name: 🚀 Deploy to Azure App Service (Staging)
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          slot-name: staging
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_STAGING }}
          package: .
      
      # 3. Health check
      - name: ❤️ Health Check - Staging
        run: |
          echo "Waiting for staging to warm up..."
          sleep 30
          curl -f https://${{ secrets.AZURE_APP_SERVICE_NAME }}-staging.azurewebsites.net/health || exit 1

  # ============================================
  # JOB 3: DEPLOY TO PRODUCTION (solo en main)
  # ============================================
  deploy-production:
    name: Deploy to Production
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://${{ secrets.AZURE_APP_SERVICE_NAME }}.azurewebsites.net
    
    steps:
      # 1. Descargar artifacts
      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
      
      # 2. Deploy a Azure App Service (Production)
      - name: 🚀 Deploy to Azure App Service (Production)
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_PRODUCTION }}
          package: .
      
      # 3. Health check
      - name: ❤️ Health Check - Production
        run: |
          echo "Waiting for production to warm up..."
          sleep 30
          curl -f https://${{ secrets.AZURE_APP_SERVICE_NAME }}.azurewebsites.net/health || exit 1
      
      # 4. Notificación
      - name: ✅ Deployment Success
        run: |
          echo "Deployment to Production completed successfully!"
          echo "URL: https://${{ secrets.AZURE_APP_SERVICE_NAME }}.azurewebsites.net"

  # ============================================
  # JOB 4: POST-DEPLOYMENT TESTS
  # ============================================
  smoke-tests:
    name: Post-Deployment Smoke Tests
    needs: deploy-production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: 🔥 Run Smoke Tests
        run: |
          echo "Running smoke tests on production..."
          
          # Test health check
          curl -f https://${{ secrets.AZURE_APP_SERVICE_NAME }}.azurewebsites.net/health
          
          # Test info endpoint
          curl -f https://${{ secrets.AZURE_APP_SERVICE_NAME }}.azurewebsites.net/info
          
          echo "✅ Smoke tests passed!"
